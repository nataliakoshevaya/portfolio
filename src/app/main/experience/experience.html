<div class="group/list">
    <h2 class="mb-4 text-2xl font-bold tracking-tight text-slate-200">
        Experience
    </h2>
    
    <ul class="flex flex-col gap-6">
        @for(experience of experiences; track $index) {
            <li class="mb-12"> 
                <app-experience-card 
                [$yearsOfExperience]="experience.yearsOfExperience"
                [$title]="experience.title"
                [$description]="experience.description"
                [$skills]="experience.skills"></app-experience-card>
            </li>
        }
    </ul>
    <div class="mb-12">
        <a class="inline-flex items-baseline font-medium leading-tight text-slate-200 font-semibold text-slate-200 group/link text-base" href="" rel="noreferrer noopener" target="_blank">View full experience</a>
    </div>
</div>
